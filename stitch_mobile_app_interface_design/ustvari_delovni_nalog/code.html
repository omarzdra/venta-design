<!DOCTYPE html>

                      "inverse-surface": "#e3e2e2",

              "borderRadius": {

<style>
    body {
      min-height: max(884px, 100dvh);
    }

<body class="bg-bg-base flex flex-col min-h-screen">
<!-- TopAppBar -->
<header class="w-full top-0 sticky z-50 bg-surface border-b border-border-low flex justify-between items-center px-space-md h-16 transition-colors duration-200">
<div class="flex items-center gap-space-sm">
<span class="material-symbols-outlined text-primary font-headline-md-mobile text-headline-md-mobile">precision_manufacturing</span>
<h1 class="font-headline-md text-headline-md font-bold text-primary uppercase tracking-tight">Ustvari Nalog</h1>
</div>
<div class="w-10 h-10 rounded-full overflow-hidden border border-border-low">
<img alt="Avatar" class="w-full h-full object-cover" data-alt="A professional headshot of a technical manager in a modern industrial setting. The lighting is focused and clean, reflecting an atmosphere of engineering precision. The background is a blurred high-tech manufacturing facility with subtle red and dark grey accents, maintaining a cohesive industrial-modern aesthetic." src="https://lh3.googleusercontent.com/aida-public/AB6AXuC4-NlcozXtUHvrYsoNAl9JF2JUj2bh9CwDt6AvwUmRyXoQvPnFny32Fc5qzT_WV7ogmxULB6W5rQIZXMHyKQU9SJQpWb5dKn7byK34LMJfYitDFs4hzx_9LINsOGu4b4gjygWTk3RkLxT7eHxYPeuPp7p4DZ9jWn9-jwSLGxvsab3Ji2IPsFkGCPPK5R8ma435WKpGb4zJc5mEBu7VNhrTRiIxdefZ5ChrOkDMGZCqICfuvJ8nUvJ_1mRPaq9URtcnK_GLrf014A"/>
</div>
</header>
<main class="flex-1 overflow-y-auto px-space-md py-space-md pb-32 max-w-2xl mx-auto w-full">
<!-- Toggle Switch -->
<div class="bg-surface-container p-1 rounded border border-border-low flex mb-space-lg">
<button class="flex-1 py-2 font-label-caps text-label-caps transition-all rounded bg-primary-container text-on-primary-container" id="btn-splosno" onclick="toggleType('splosno')">
                SPLOŠNO
            </button>
<button class="flex-1 py-2 font-label-caps text-label-caps transition-all rounded text-on-surface-variant hover:bg-surface-elevated" id="btn-vozila" onclick="toggleType('vozila')">
                VOZILA
            </button>
</div>
<form class="space-y-space-lg" id="workOrderForm">
<!-- Basic Info Section -->
<div class="bg-surface-card border border-border-low p-space-md rounded-lg space-y-space-md">
<div class="grid grid-cols-1 md:grid-cols-2 gap-space-md">
<div class="space-y-space-xs">
<label class="font-label-caps text-label-caps text-on-surface-variant block uppercase">DN ŠTEVILKA *</label>
<input class="w-full bg-surface-elevated border border-border-low rounded p-2 text-data-mono font-data-mono text-text-high" placeholder="DN-2024-001" required="" type="text"/>
</div>
<div class="space-y-space-xs">
<label class="font-label-caps text-label-caps text-on-surface-variant block uppercase">STATUS</label>
<div class="bg-surface-elevated border border-border-low rounded p-2 flex items-center gap-2">
<span class="w-2 h-2 rounded-full bg-status-warning"></span>
<span class="font-label-caps text-label-caps text-on-surface">V IZDELAVI</span>
</div>
</div>
</div>
<div class="space-y-space-xs">
<label class="font-label-caps text-label-caps text-on-surface-variant block uppercase">IME PROJEKTA *</label>
<input class="w-full bg-surface-elevated border border-border-low rounded p-2 text-body-md font-body-md text-text-high" placeholder="Servisni poseg A1" required="" type="text"/>
</div>
<div class="space-y-space-xs">
<label class="font-label-caps text-label-caps text-on-surface-variant block uppercase">STRANKA *</label>
<input class="w-full bg-surface-elevated border border-border-low rounded p-2 text-body-md font-body-md text-text-high" placeholder="Vnesite ime podjetja ali osebe" required="" type="text"/>
</div>
<div class="space-y-space-xs">
<label class="font-label-caps text-label-caps text-on-surface-variant block uppercase">KONTAKTNI PODATKI</label>
<input class="w-full bg-surface-elevated border border-border-low rounded p-2 text-body-md font-body-md text-text-high" placeholder="Telefon / E-pošta" type="text"/>
</div>
</div>
<!-- Vehicle Info (Conditional) -->
<div class="hidden transition-all duration-300" id="vehicleSection">
<div class="bg-surface-card border border-border-low p-space-md rounded-lg space-y-space-md">
<div class="flex items-center gap-2 mb-2">
<span class="material-symbols-outlined text-primary">directions_car</span>
<h2 class="font-headline-md text-headline-md uppercase text-text-high">Podatki o Vozilu</h2>
</div>
<div class="grid grid-cols-1 md:grid-cols-2 gap-space-md">
<div class="space-y-space-xs">
<label class="font-label-caps text-label-caps text-on-surface-variant block uppercase">ZNAMKA / MODEL</label>
<input class="w-full bg-surface-elevated border border-border-low rounded p-2 text-body-md font-body-md text-text-high" placeholder="npr. Audi A6" type="text"/>
</div>
<div class="space-y-space-xs">
<label class="font-label-caps text-label-caps text-on-surface-variant block uppercase">REGISTRSKA ŠT.</label>
<input class="w-full bg-surface-elevated border border-border-low rounded p-2 font-data-mono text-data-mono text-text-high uppercase" placeholder="LJ-VENTA1" type="text"/>
</div>
</div>
<div class="space-y-space-xs">
<label class="font-label-caps text-label-caps text-on-surface-variant block uppercase">VIN ŠTEVILKA (ŠASIJA)</label>
<input class="w-full bg-surface-elevated border border-border-low rounded p-2 font-data-mono text-data-mono text-text-high uppercase" placeholder="17-mestna številka" type="text"/>
</div>
</div>
</div>
<!-- Material Usage Section -->
<div class="bg-surface-card border border-border-low p-space-md rounded-lg space-y-space-md">
<div class="flex justify-between items-center">
<h2 class="font-headline-md text-headline-md uppercase text-text-high">Poraba Materiala</h2>
<button class="bg-surface-elevated border border-border-low text-primary px-3 py-1.5 rounded flex items-center gap-1 font-label-caps text-label-caps hover:bg-surface-container-high transition-colors" type="button">
<span class="material-symbols-outlined text-[18px]">add</span> DODAJ MATERIAL
                    </button>
</div>
<div class="border-t border-border-low pt-space-sm">
<div class="flex items-center justify-between py-2 border-b border-border-low opacity-50 italic">
<span class="font-body-md text-body-md text-on-surface-variant">Ni dodanega materiala...</span>
</div>
</div>
</div>
<!-- Images Section -->
<div class="bg-surface-card border border-border-low p-space-md rounded-lg space-y-space-md">
<h2 class="font-headline-md text-headline-md uppercase text-text-high">Slike in Dokumentacija</h2>
<div class="grid grid-cols-2 sm:grid-cols-4 gap-space-sm">
<div class="aspect-square bg-surface-elevated border-2 border-dashed border-border-low flex flex-col items-center justify-center cursor-pointer hover:border-primary transition-colors">
<span class="material-symbols-outlined text-on-surface-variant">photo_camera</span>
<span class="font-label-caps text-[10px] mt-1">SLIKAJ</span>
</div>
<div class="aspect-square bg-surface-elevated border-2 border-dashed border-border-low flex flex-col items-center justify-center cursor-pointer hover:border-primary transition-colors">
<span class="material-symbols-outlined text-on-surface-variant">upload_file</span>
<span class="font-label-caps text-[10px] mt-1">NALOŽI</span>
</div>
</div>
</div>
<!-- Submit Button -->
<button class="w-full bg-primary-container text-on-primary-container py-4 rounded-lg font-headline-md text-headline-md font-bold uppercase tracking-wider hover:bg-[#ff2929] active:scale-[0.98] transition-all shadow-lg" type="submit">
                Ustvari Nalogo
            </button>
</form>
</main>
<!-- BottomNavBar -->
<nav class="fixed bottom-0 left-0 w-full flex justify-around items-center h-20 px-space-sm bg-surface border-t border-border-low z-50">
<div class="flex flex-col items-center justify-center text-on-secondary-container hover:bg-surface-elevated transition-colors px-4 py-1 rounded-full cursor-pointer">
<span class="material-symbols-outlined" data-icon="inventory_2">inventory_2</span>
<span class="font-label-caps text-label-caps mt-1">Zaloga</span>
</div>
<div class="flex flex-col items-center justify-center bg-primary-container text-on-primary-container rounded-full px-4 py-1 cursor-pointer">
<span class="material-symbols-outlined" data-icon="assignment">assignment</span>
<span class="font-label-caps text-label-caps mt-1">Naloge</span>
</div>
<div class="flex flex-col items-center justify-center text-on-secondary-container hover:bg-surface-elevated transition-colors px-4 py-1 rounded-full cursor-pointer">
<span class="material-symbols-outlined" data-icon="history">history</span>
<span class="font-label-caps text-label-caps mt-1">Evidenca</span>
</div>
<div class="flex flex-col items-center justify-center text-on-secondary-container hover:bg-surface-elevated transition-colors px-4 py-1 rounded-full cursor-pointer">
<span class="material-symbols-outlined" data-icon="analytics">analytics</span>
<span class="font-label-caps text-label-caps mt-1">Analiza</span>
</div>
</nav>
<script>
        function toggleType(type) {
            const btnSplosno = document.getElementById('btn-splosno');
            const btnVozila = document.getElementById('btn-vozila');
            const vehicleSection = document.getElementById('vehicleSection');

            if (type === 'splosno') {
                btnSplosno.classList.add('bg-primary-container', 'text-on-primary-container');
                btnSplosno.classList.remove('text-on-surface-variant', 'hover:bg-surface-elevated');
                btnVozila.classList.remove('bg-primary-container', 'text-on-primary-container');
                btnVozila.classList.add('text-on-surface-variant', 'hover:bg-surface-elevated');
                vehicleSection.classList.add('hidden');
            } else {
                btnVozila.classList.add('bg-primary-container', 'text-on-primary-container');
                btnVozila.classList.remove('text-on-surface-variant', 'hover:bg-surface-elevated');
                btnSplosno.classList.remove('bg-primary-container', 'text-on-primary-container');
                btnSplosno.classList.add('text-on-surface-variant', 'hover:bg-surface-elevated');
                vehicleSection.classList.remove('hidden');
            }
        }

        document.getElementById('workOrderForm').addEventListener('submit', function(e) {
            e.preventDefault();
            // Simulation of submission
            const btn = e.target.querySelector('button[type="submit"]');
            const originalText = btn.innerText;
            btn.innerText = "USTVARJANJE...";
            btn.classList.add('opacity-75', 'cursor-not-allowed');
            
            setTimeout(() => {
                alert('Naloga je bila uspešno ustvarjena!');
                btn.innerText = originalText;
                btn.classList.remove('opacity-75', 'cursor-not-allowed');
            }, 1000);
        });
    </script>
</body></html>
